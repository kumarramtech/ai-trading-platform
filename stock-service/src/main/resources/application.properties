spring.application.name=stock-service
server.port=8081

spring.datasource.url=jdbc:mysql://localhost:3306/ai_trading_platform
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

market.provider=upstox
upstox.client-id=
upstox.client-secret=
upstox.redirect-uri=http://localhost:8081/upstox/callback
upstox.base-url=https://api.upstox.com/v2

upstox.authorization-url=https://api.upstox.com/v2/login/authorization/dialog

upstox.token-url=https://api.upstox.com/v2/login/authorization/token
upstox.analytics-token=
upstox.market-url=https://api.upstox.com/v2
upstox.instrument.url= https://assets.upstox.com/market-quote/instruments/exchange/complete.json.gz
upstox.instrument.url.connect-timeout= 5000
upstox.instrument.url.read-timeout= 30000
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

bootstrap.history.lookback-days=365
bootstrap.history.max-symbols-per-run=500
bootstrap.history.thread-pool-size=10
bootstrap.enabled=false
bootstrap.cron=0 0 8 * * MON-FRI
bootstrap.history.interval=day
bootstrap.history.exchange=NSE
bootstrap.history.segment=NSE_EQ
bootstrap.history.instrument-type=EQ